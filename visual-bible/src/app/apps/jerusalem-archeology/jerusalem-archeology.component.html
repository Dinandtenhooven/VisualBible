<div class="app-wrapper">
  <h1>Jerususalem Map</h1>

  @if(htmlSnippet) {
    <app-mention
      type="MAP"
      [html]="htmlSnippet">
    </app-mention>
  }

  <div id="map"></div>

  @if(selectedData) {
    <div>
      <h2>{{selectedData.title}}</h2>
      <div class="columns">
        <p>{{selectedData.article?.content}}</p>
        @for(ref of selectedData.article?.bibleReferences; track ref) {
          <bible-reference [bookRef]="ref" [popupMode]="false"></bible-reference>
        }
      </div>
    </div>
  }

  <div class="mt-2">
    @for(item of jerusalemData; track item) {
      <button (click)="selectData(item)">
        {{item.title}}
      </button>
    }
  </div>
</div>
